function TreeNode({ node, depth, path, expandedSet, toggleExpand, scrollToRef }) {
  depth = depth || 0;
  path = path || [];
  const config = TYPE_CONFIG[node.type] || TYPE_CONFIG.info;
  const hasChildren = node.children && node.children.length > 0;
  const isExpanded = expandedSet.has(node.id);
  const ref = useRef(null);

  useEffect(function() {
    if (scrollToRef.current === node.id && ref.current) {
      ref.current.scrollIntoView({ behavior: "smooth", block: "start" });
      scrollToRef.current = null;
    }
  });

  return h("div", { ref: ref, style: { marginLeft: depth === 0 ? 0 : 20, marginTop: depth === 0 ? 0 : 12 } },
    h("div", {
      onClick: function() { if (hasChildren) toggleExpand(node.id); },
      style: {
        background: config.bg, border: "1.5px solid " + config.border,
        borderRadius: 8, padding: "12px 16px",
        cursor: hasChildren ? "pointer" : "default", transition: "all 0.15s ease",
      },
      onMouseEnter: function(e) { if (hasChildren) e.currentTarget.style.borderColor = "#fff"; },
      onMouseLeave: function(e) { e.currentTarget.style.borderColor = config.border; },
    },
      h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 6 } },
        h("span", { style: {
          display: "inline-block", fontSize: 9, fontWeight: 700, letterSpacing: "0.08em",
          padding: "2px 7px", borderRadius: 3, background: config.labelBg, color: config.labelText,
          fontFamily: "'IBM Plex Mono', monospace",
        }}, config.label),
        hasChildren && h("span", { style: { fontSize: 10, color: "#888", fontFamily: "'IBM Plex Mono', monospace" } },
          (isExpanded ? "\u25be" : "\u25b8") + " " + node.children.length + " " + (node.children.length === 1 ? "branch" : "branches")
        )
      ),
      h("div", { style: {
        fontSize: 15, fontWeight: 600, color: "#e8e4dc", lineHeight: 1.35,
        fontFamily: "'Source Serif 4', Georgia, serif", marginBottom: node.body ? 6 : 0,
      }}, node.title),
      node.body && h("div", { style: {
        fontSize: 13, color: "#b8b2a6", lineHeight: 1.55,
        fontFamily: "'IBM Plex Sans', Helvetica, sans-serif",
      }}, node.body),
      node.annotation && isExpanded && h("div", { style: {
        marginTop: 10, padding: "10px 12px", background: "rgba(255,255,255,0.04)",
        borderLeft: "3px solid " + config.border, borderRadius: "0 4px 4px 0",
        fontSize: 12.5, color: "#c9c3b8", lineHeight: 1.55,
        fontFamily: "'IBM Plex Sans', Helvetica, sans-serif", fontStyle: "italic",
      }}, node.annotation)
    ),
    isExpanded && hasChildren && h("div", {
      style: { borderLeft: "1px dashed " + config.border + "40", marginLeft: 16, paddingLeft: 4 }
    },
      node.children.map(function(child) {
        return h(TreeNode, {
          key: child.id, node: child, depth: depth + 1, path: path.concat([node.id]),
          expandedSet: expandedSet, toggleExpand: toggleExpand, scrollToRef: scrollToRef,
        });
      })
    )
  );
}

        fontSize: 22, fontWeight: 700, fontFamily: "'Source Serif 4', Georgia, serif",
        color: "#e2b659", margin: 0, lineHeight: 1.3,
      }}, "Clinical Assessment of \u201cHistamine Issues\u201d"),
      h("p", { style: {
        fontSize: 13, color: "#888", marginTop: 4, lineHeight: 1.5,
        fontFamily: "'IBM Plex Sans', Helvetica, sans-serif",
      }}, "A branching decision tree for assessing those who present with suspected MCAS, histamine intolerance, or adjacent reactive multisystem pictures. Assumes no labs, no prescriptions \u2014 using herbs, supplements, dietary strategies, OTC medicines, and clinical reasoning.")
    ),
    h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 } },
      h("button", { onClick: expandAll, style: btnStyle }, "Expand All"),
      h("button", { onClick: collapseAll, style: btnStyle }, "Collapse All"),
      h("span", { style: { width: 1, background: "#333", margin: "0 4px" } }),
      quickPaths.map(function(qp) {
        return h("button", {
          key: qp.label,
          onClick: function() { expandPath(qp.ids); },
          style: Object.assign({}, btnStyle, { background: "#1a1a28", borderColor: "#3a3a4a" }),
        }, qp.label);
      })
    ),
    h(Legend, null),
    h(TreeNode, { node: TREE, expandedSet: expandedSet, toggleExpand: toggleExpand, scrollToRef: scrollToRef })
  );
}

// ─── MOUNT ───────────────────────────────────────────────────────────────────

var root = ReactDOM.createRoot(document.getElementById("root"));
root.render(h(HistamineDecisionTree, null));
</script>
