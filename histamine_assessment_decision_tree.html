    function TreeNode({ node, depth = 0, path = [], expandedSet, toggleExpand, scrollToRef }) {
      const config = TYPE_CONFIG[node.type] || TYPE_CONFIG.info;
      const hasChildren = node.children && node.children.length > 0;
      const nodeKey = node.id;
      const isExpanded = expandedSet.has(nodeKey);
      const ref = useRef(null);

      useEffect(() => {
        if (scrollToRef.current === nodeKey && ref.current) {
          ref.current.scrollIntoView({ behavior: "smooth", block: "start" });
          scrollToRef.current = null;
        }
      });

      return (
        <div ref={ref} style={{ marginLeft: depth === 0 ? 0 : 20, marginTop: depth === 0 ? 0 : 12 }}>
          <div
            onClick={() => { if (hasChildren) toggleExpand(nodeKey); }}
            style={{
              background: config.bg,
              border: `1.5px solid ${config.border}`,
              borderRadius: 8,
              padding: "12px 16px",
              cursor: hasChildren ? "pointer" : "default",
              transition: "all 0.15s ease",
              position: "relative",
            }}
            onMouseEnter={e => { if (hasChildren) e.currentTarget.style.borderColor = "#fff"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = config.border; }}
          >
            {/* Type label badge */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <span style={{
                display: "inline-block",
                fontSize: 9,
                fontWeight: 700,
                letterSpacing: "0.08em",
                padding: "2px 7px",
                borderRadius: 3,
                background: config.labelBg,
                color: config.labelText,
                fontFamily: "'IBM Plex Mono', monospace",
              }}>
                {config.label}
              </span>
              {hasChildren && (
                <span style={{
                  fontSize: 10,
                  color: "#888",
                  fontFamily: "'IBM Plex Mono', monospace",
                }}>
                  {isExpanded ? "▾" : "▸"} {node.children.length} {node.children.length === 1 ? "branch" : "branches"}
                </span>
              )}
            </div>

            {/* Title */}
            <div style={{
              fontSize: 15,
              fontWeight: 600,
              color: "#e8e4dc",
              lineHeight: 1.35,
              fontFamily: "'Source Serif 4', Georgia, serif",
              marginBottom: node.body ? 6 : 0,
            }}>
              {node.title}
            </div>

            {/* Body */}
            {node.body && (
              <div style={{
                fontSize: 13,
                color: "#b8b2a6",
                lineHeight: 1.55,
                fontFamily: "'IBM Plex Sans', Helvetica, sans-serif",
              }}>
                {node.body}
              </div>
            )}

            {/* Annotation */}
            {node.annotation && isExpanded && (
              <div style={{
                marginTop: 10,
                padding: "10px 12px",
                background: "rgba(255,255,255,0.04)",
                borderLeft: `3px solid ${config.border}`,
                borderRadius: "0 4px 4px 0",
                fontSize: 12.5,
                color: "#c9c3b8",
                lineHeight: 1.55,
                fontFamily: "'IBM Plex Sans', Helvetica, sans-serif",
                fontStyle: "italic",
              }}>
                {node.annotation}
              </div>
            )}
          </div>

          {/* Children */}
          {isExpanded && hasChildren && (
            <div style={{
              borderLeft: `1px dashed ${config.border}40`,
              marginLeft: 16,
              paddingLeft: 4,
            }}>
              {node.children.map(child => (
                <TreeNode
                  key={child.id}
                  node={child}
                  depth={depth + 1}
                  path={[...path, node.id]}
                  expandedSet={expandedSet}
                  toggleExpand={toggleExpand}
                  scrollToRef={scrollToRef}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

                }} />
                <span style={{
                  fontSize: 10.5, color: "#999",
                  fontFamily: "'IBM Plex Mono', monospace",
                }}>
                  {it.desc}
                </span>
              </div>
            );
          })}
        </div>
      );
    }

    // ─── BUTTON STYLE ────────────────────────────────────────────────────────────

    const btnStyle = {
      padding: "5px 10px",
      fontSize: 11,
      fontFamily: "'IBM Plex Mono', monospace",
      background: "#16161e",
      color: "#b8b2a6",
      border: "1px solid #2a2a35",
      borderRadius: 4,
      cursor: "pointer",
    };

    // ─── MAIN APP ───────────────────────────────────────────────────────────────

    function HistamineDecisionTree() {
      const [expandedSet, setExpandedSet] = useState(new Set(["root"]));
      const scrollToRef = useRef(null);

      const toggleExpand = useCallback((id) => {
        setExpandedSet(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id);
          else next.add(id);
          return next;
        });
      }, []);

      const expandAll = useCallback(() => {
        const all = new Set();
        const walk = (node) => { all.add(node.id); (node.children || []).forEach(walk); };
        walk(TREE);
        setExpandedSet(all);
      }, []);

      const collapseAll = useCallback(() => {
        setExpandedSet(new Set(["root"]));
      }, []);

      const expandPath = useCallback((ids) => {
        setExpandedSet(prev => {
          const next = new Set(prev);
          ids.forEach(id => next.add(id));
          return next;
        });
        scrollToRef.current = ids[ids.length - 1];
      }, []);

      const quickPaths = [
        { label: "Safety Screen",  ids: ["root", "safety-screen"] },
        { label: "HIT Pathway",    ids: ["root", "initial-assessment", "temporal-pattern", "episodic-clear", "episodic-severity", "episodic-moderate", "trigger-type", "trigger-food-specific", "hit-assessment", "hit-drivers"] },
        { label: "Complex Atopy",  ids: ["root", "initial-assessment", "temporal-pattern", "episodic-clear", "episodic-severity", "episodic-moderate", "trigger-type", "trigger-food-broad", "broad-atopic-check", "broad-atopic-yes", "atopy-assessment"] },
        { label: "Sensitization",  ids: ["root", "initial-assessment", "temporal-pattern", "chronic-diffuse", "chronic-assess-systems", "chronic-neuro", "neuro-prominent", "sensitization-full", "sens-markers"] },
        { label: "Gut-Centered",   ids: ["root", "initial-assessment", "temporal-pattern", "chronic-diffuse", "chronic-assess-systems", "chronic-gi", "gi-dominant", "gut-assessment"] },
        { label: "POTS / Autonomic", ids: ["root", "initial-assessment", "temporal-pattern", "chronic-diffuse", "chronic-assess-systems", "chronic-autonomic", "pots-check"] },
        { label: "Hormonal",       ids: ["root", "initial-assessment", "temporal-pattern", "chronic-diffuse", "chronic-assess-systems", "chronic-hormonal", "hormonal-branch"] },
        { label: "What Always Helps", ids: ["root", "convergent-protocol"] },
      ];

      return (
        <div style={{
          maxWidth: 820,
          margin: "0 auto",
          padding: "24px 16px 60px",
          fontFamily: "'IBM Plex Sans', Helvetica, sans-serif",
          color: "#e8e4dc",
          background: "#0d0d14",
          minHeight: "100vh",
        }}>
          {/* Header */}
          <div style={{ marginBottom: 20 }}>
            <h1 style={{
              fontSize: 22,
              fontWeight: 700,
              fontFamily: "'Source Serif 4', Georgia, serif",
              color: "#e2b659",
              margin: 0,
              lineHeight: 1.3,
            }}>
              Clinical Assessment of "Histamine Issues"
            </h1>
            <p style={{
              fontSize: 13,
              color: "#888",
              marginTop: 4,
              lineHeight: 1.5,
              fontFamily: "'IBM Plex Sans', Helvetica, sans-serif",
            }}>
              A branching decision tree for assessing those who present with suspected MCAS, histamine intolerance, or adjacent reactive multisystem pictures. Assumes no labs, no prescriptions — using herbs, supplements, dietary strategies, OTC medicines, and clinical reasoning.
            </p>
          </div>

          {/* Controls */}
          <div style={{
            display: "flex", flexWrap: "wrap", gap: 6,
            marginBottom: 12,
          }}>
            <button onClick={expandAll} style={btnStyle}>Expand All</button>
            <button onClick={collapseAll} style={btnStyle}>Collapse All</button>
            <span style={{ width: 1, background: "#333", margin: "0 4px" }} />
            {quickPaths.map(qp => (
              <button
                key={qp.label}
                onClick={() => expandPath(qp.ids)}
                style={{ ...btnStyle, background: "#1a1a28", borderColor: "#3a3a4a" }}
              >
                {qp.label}
              </button>
            ))}
          </div>

          <Legend />

          {/* Tree */}
          <TreeNode
            node={TREE}
            expandedSet={expandedSet}
            toggleExpand={toggleExpand}
            scrollToRef={scrollToRef}
          />
        </div>
      );
    }

    // ─── MOUNT ──────────────────────────────────────────────────────────────────

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<HistamineDecisionTree />);
  </script>
</body>
</html>
